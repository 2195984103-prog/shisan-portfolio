[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# File-extension rules — most specific first (1yr immutable for images & video)
[[headers]]
  for = "/assets/**/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/**/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Font rule
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# General asset catch-all (7d)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
